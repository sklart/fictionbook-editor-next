name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-win32:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check generated version files
        shell: pwsh
        run: |
          ./tools/version/sync-version.ps1
          git diff --exit-code -- packaging/nsis/Installer/version.nsh

      - name: Build Release Win32
        shell: pwsh
        run: ./tools/build/build.ps1 -Configuration Release -Platform Win32 -PlatformToolset v143 -SkipUpx -WarningsAsErrors

      - name: Install NSIS
        shell: pwsh
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\NSIS\makensis.exe")) {
            choco install nsis --no-progress --yes
          }

      - name: Create release artifacts
        shell: pwsh
        run: |
          $arguments = @{
            Configuration = "Release"
            Platform = "Win32"
            PlatformToolset = "v143"
            SkipBuild = $true
          }
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $arguments.ValidateUpdateManifest = $true
            $arguments.ReleaseTag = $env:GITHUB_REF_NAME
          }
          ./tools/build/create-release.ps1 @arguments

      - name: Verify release archives
        shell: pwsh
        run: ./tools/build/verify-artifacts.ps1 -Platform Win32

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: FictionBookEditorNext-${{ github.sha }}-win32
          path: out/artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Prepare human-readable release notes
        if: github.ref_type == 'tag'
        shell: pwsh
        run: ./tools/build/new-release-notes.ps1 -Version "${{ github.ref_name }}" -OutputPath out/RELEASE_NOTES.md

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" out/artifacts/* --verify-tag --notes-file out/RELEASE_NOTES.md
